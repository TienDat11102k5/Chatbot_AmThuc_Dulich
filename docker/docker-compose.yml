# =============================================================================
# DOCKER COMPOSE — Chatbot Ẩm Thực & Du Lịch
# Khởi chạy toàn bộ hệ thống với 1 lệnh: docker compose up -d
#
# Kiến trúc Microservices:
#   Frontend (ReactJS:3000) → Backend (Spring Boot:8080)
#                                  ↓              ↓
#                         AI Service (FastAPI:8000)  Redis (6379)
#                                  ↓
#                         PostgreSQL + pgvector (5432)
# =============================================================================
version: '3.8'

services:

  # ===========================================================================
  # 1. DATABASE — PostgreSQL 15 + pgvector Extension
  # Image: pgvector/pgvector:pg15 (PostgreSQL 15 tích hợp sẵn pgvector)
  # Mục đích: Lưu trữ dữ liệu chính + hỗ trợ tìm kiếm vector ngữ nghĩa
  # Port: 5432 (mặc định PostgreSQL)
  # ===========================================================================
  database:
    image: pgvector/pgvector:pg15
    container_name: chatbot_db
    environment:
      POSTGRES_DB: chatbot_db         # Tên database tự động tạo khi khởi chạy
      POSTGRES_USER: admin            # Tài khoản admin
      POSTGRES_PASSWORD: password     # Mật khẩu (đổi khi lên Production!)
    ports:
      - "5432:5432"
    networks:
      - chatbot_network

  # ===========================================================================
  # 2. AI SERVICE — Python FastAPI
  # Mục đích: Xử lý AI/NLP (embedding, semantic search, sinh phản hồi chatbot)
  # Build từ thư mục ../ai_service (cần có Dockerfile)
  # Port: 8000
  # ===========================================================================
  ai_service:
    build:
      context: ../ai_service
    container_name: ai_service
    ports:
      - "8000:8000"
    networks:
      - chatbot_network

  # ===========================================================================
  # 3. BACKEND — Spring Boot (Java 17)
  # Mục đích: API server chính, xử lý nghiệp vụ, xác thực, cache
  # Port: 8080
  # Biến môi trường: Ghi đè application.properties khi chạy trong Docker
  # depends_on: Chờ database + ai_service + redis khởi chạy trước
  # ===========================================================================
  backend:
    build:
      context: ../backend
    container_name: backend_core
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/chatbot_db  # Kết nối DB qua tên container
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - AI_SERVICE_URL=http://ai_service:8000    # URL AI Service trong mạng Docker
      - SPRING_DATA_REDIS_HOST=redis             # Redis trong mạng Docker
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - database      # Database phải sẵn sàng trước Backend
      - ai_service    # AI Service phải sẵn sàng trước Backend
      - redis         # Redis phải sẵn sàng trước Backend
    networks:
      - chatbot_network

  # ===========================================================================
  # 4. FRONTEND — ReactJS (Nginx)
  # Mục đích: Giao diện người dùng (SPA)
  # Port: 3000 (map từ port 80 trong container Nginx)
  # depends_on: Chờ backend khởi chạy trước
  # ===========================================================================
  frontend:
    build:
      context: ../frontend
    container_name: frontend_web
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - chatbot_network

  # ===========================================================================
  # 5. REDIS — Bộ nhớ đệm Cache (In-Memory)
  # Image: redis:7-alpine (bản gọn nhẹ ~5MB)
  # Mục đích: Cache dữ liệu hay đọc (danh mục, địa điểm, thông tin user)
  # Cấu hình:
  #   --appendonly yes: Bật AOF persistence (dữ liệu cache không mất khi restart)
  #   --maxmemory 256mb: Giới hạn RAM sử dụng tối đa 256MB
  #   --maxmemory-policy allkeys-lru: Khi đầy RAM, tự động xóa key ít dùng nhất
  # Port: 6379 (mặc định Redis)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - chatbot_network

# =============================================================================
# NETWORKS — Mạng nội bộ Docker
# driver: bridge (mặc định) — cho phép các container giao tiếp qua tên container
# VD: Backend gọi "database:5432" thay vì IP cụ thể
# =============================================================================
networks:
  chatbot_network:
    driver: bridge
