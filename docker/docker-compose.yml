# =============================================================================
# DOCKER COMPOSE — Chatbot Ẩm Thực & Du Lịch
# Khởi chạy toàn bộ hệ thống với 1 lệnh: docker compose up -d
#
# Kiến trúc Microservices:
#   Frontend (ReactJS:3000) → Backend (Spring Boot:8080)
#                                  ↓              ↓
#                         AI Service (FastAPI:8000)  Redis (6379)
#                                  ↓              ↓
#                         PostgreSQL + pgvector  RabbitMQ (5672/15672)
# =============================================================================

services:

  # ===========================================================================
  # 1. DATABASE — PostgreSQL 15 + pgvector Extension
  # Image: pgvector/pgvector:pg15 (PostgreSQL 15 tích hợp sẵn pgvector)
  # Mục đích: Lưu trữ dữ liệu chính + hỗ trợ tìm kiếm vector ngữ nghĩa
  # Port: 5432 (mặc định PostgreSQL)
  # ===========================================================================
  database:
    image: pgvector/pgvector:pg15
    container_name: chatbot_db
    environment:
      POSTGRES_DB: chatbot_db         # Tên database tự động tạo khi khởi chạy
      POSTGRES_USER: admin            # Tài khoản admin
      POSTGRES_PASSWORD: password     # Mật khẩu (đổi khi lên Production!)
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chatbot_network

  # ===========================================================================
  # 2. REDIS — Bộ nhớ đệm Cache (In-Memory)
  # Image: redis:7-alpine (bản gọn nhẹ ~5MB)
  # Mục đích:
  #   - Cache dữ liệu hay đọc (categories=30m, places=10m, users=5m)
  #   - Cache phiên chat (chat_sessions=15m, chat_history=10m)
  #   - Rate Limiter (đếm request theo IP, INCR + EXPIRE)
  #   - [Phase 7] SemanticCache cho AI Service (chat:cache:* TTL=1h)
  # Cấu hình:
  #   --appendonly yes: Bật AOF persistence (cache không mất khi restart)
  #   --maxmemory 256mb: Giới hạn RAM tối đa 256MB
  #   --maxmemory-policy allkeys-lru: Tự xóa key ít dùng nhất khi đầy
  # Port: 6379 (mặc định Redis)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - "16379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chatbot_network

  # ===========================================================================
  # 3. RABBITMQ — Message Queue bất đồng bộ [THÊM MỚI Phase 6]
  # Image: rabbitmq:3-management-alpine (tích hợp Management UI)
  # Mục đích:
  #   - email.queue: Hàng đợi gửi email OTP không blocking
  #   - email.dlq: Dead Letter Queue chứa email thất bại để admin xem xét
  # Ports:
  #   - 5672: AMQP protocol (Backend kết nối vào đây để gửi/nhận message)
  #   - 15672: Management UI (http://localhost:15672 — admin/password)
  # Credentials: admin/password (đổi khi lên Production!)
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chatbot_rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol — Backend dùng port này
      - "15672:15672"   # Management Web UI — Truy cập trình duyệt xem queue
    environment:
      RABBITMQ_DEFAULT_USER: admin     # Tài khoản đăng nhập Management UI
      RABBITMQ_DEFAULT_PASS: password  # Mật khẩu (đổi khi lên Production!)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - chatbot_network

  # ===========================================================================
  # 4. AI SERVICE — Python FastAPI
  # Mục đích: Xử lý AI/NLP (embedding, semantic search, sinh phản hồi chatbot)
  # Build từ thư mục ../ai_service (cần có Dockerfile)
  # Port: 8000
  # Biến môi trường:
  #   REDIS_HOST: Kết nối Redis để dùng Semantic Cache (không mất khi restart)
  # ===========================================================================
  ai_service:
    build:
      context: ../ai_service
    container_name: ai_service
    hostname: aiservice     # Giữ hostname cũ để Backend Java gọi được (RFC 952 không cho underscore)
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis    # [THÊM MỚI Phase 7] Kết nối Redis cho SemanticCache
      - REDIS_PORT=6379
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=chatbot_db
      - DB_USER=${DB_USERNAME:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      database:
        condition: service_healthy   # Chờ PostgreSQL healthy trước khi start
      redis:
        condition: service_healthy   # Chờ Redis healthy trước khi start
    restart: on-failure              # Tự restart nếu entrypoint fail
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s             # AI Service cần thời gian load model + import data
    volumes:
      - ai_models_data:/app/models    # Persist trained AI models across rebuilds
    networks:
      - chatbot_network

  # ===========================================================================
  # 5. BACKEND — Spring Boot (Java 21)
  # Mục đích: API server chính, xử lý nghiệp vụ, xác thực, cache
  # Port: 8080
  # Biến môi trường: Ghi đè application.properties khi chạy trong Docker
  # depends_on: Chờ database + ai_service + redis + rabbitmq khởi chạy trước
  # ===========================================================================
  backend:
    build:
      context: ../backend
    container_name: backend_core
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      MAIL_USERNAME: ${MAIL_USERNAME:-your_gmail_address@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your_gmail_app_password}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your_google_client_id.apps.googleusercontent.com}
      
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/chatbot_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      
      AI_SERVICE_URL: http://aiservice:8000      # Dùng hostname (không underscore, tuân thủ RFC 952)
      SPRING_DATA_REDIS_HOST: redis              # Redis trong mạng Docker
      SPRING_DATA_REDIS_PORT: 6379
      
      RABBITMQ_HOST: rabbitmq                    # [THÊM MỚI Phase 6] RabbitMQ trong Docker
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: password
    depends_on:
      database:
        condition: service_healthy   # Chờ PostgreSQL healthy (Flyway migration cần DB sẵn sàng)
      ai_service:
        condition: service_healthy   # Chờ AI Service healthy
      redis:
        condition: service_healthy   # Chờ Redis healthy
      rabbitmq:
        condition: service_healthy   # Chờ RabbitMQ healthy
    volumes:
      - ./data/uploads:/app/uploads  # Ánh xạ thư mục vật lý chứa ảnh avatar ra ngoài host
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f java || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - chatbot_network

  # ===========================================================================
  # 6. FRONTEND — ReactJS (Nginx)
  # Mục đích: Giao diện người dùng (SPA) phục vụ qua Nginx
  # Build: Multi-stage (Node.js build → Nginx serve static files)
  # Port: 3000 (host) → 80 (Nginx trong container)
  # Nginx proxy /api/* → backend:8080 (không cần CORS khi dùng proxy)
  # depends_on: Chờ backend khởi chạy trước
  # ===========================================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend_web
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production          # Môi trường production (Vite build đã tối ưu bundle)
    depends_on:
      backend:
        condition: service_healthy   # Chờ Backend healthy
    networks:
      - chatbot_network
    restart: unless-stopped          # Tự khởi động lại trừ khi dừng thủ công
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]  # Kiểm tra Nginx đang chạy
      interval: 30s                  # Kiểm tra mỗi 30 giây
      timeout: 10s                   # Timeout 10 giây
      retries: 3                     # Thử lại 3 lần trước khi báo unhealthy
      start_period: 15s              # Cho 15 giây để container khởi động trước khi check
    logging:
      driver: "json-file"
      options:
        max-size: "10m"              # Log tối đa 10MB/file
        max-file: "3"               # Giữ tối đa 3 file log cũ

# =============================================================================
# NETWORKS — Mạng nội bộ Docker
# driver: bridge (mặc định) — cho phép các container giao tiếp qua tên container
# VD: Backend gọi "database:5432", "rabbitmq:5672", "redis:6379"
# =============================================================================
networks:
  chatbot_network:
    driver: bridge

# =============================================================================
# VOLUMES — Ổ đĩa lưu trữ dữ liệu vĩnh viễn (Persist Data)
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ai_models_data:
