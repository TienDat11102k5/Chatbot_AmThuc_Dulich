# =============================================================================
# APPLICATION.PROPERTIES
# Cấu hình chính cho Spring Boot Backend — Chatbot Ẩm Thực & Du Lịch
# =============================================================================

spring.application.name=chatbot-backend

# =============================================================================
# KẾT NỐI DATABASE (PostgreSQL)
# Thông tin kết nối được đọc từ file .env (không hardcode mật khẩu vào code)
# Khi chạy Docker: URL trỏ tới container "database" thay vì localhost
# =============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/chatbot_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

# =============================================================================
# JPA/HIBERNATE
# ddl-auto=validate: Hibernate CHỈ kiểm tra schema, KHÔNG tự tạo/sửa bảng
# Lý do: Flyway đảm nhận toàn bộ việc quản lý schema (migration files)
# show-sql=true: Hiển thị câu SQL trên console (chỉ dùng khi DEV, tắt khi PROD)
# open-in-view=false: Tắt Open Session in View — tránh lazy loading ngoài Service
# =============================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# FLYWAY — Quản lý phiên bản Database Schema
# locations: Thư mục chứa file SQL migration (V1__, V2__...)
# baseline-on-migrate: Cho phép migration ngay cả khi DB đã có dữ liệu sẵn
# =============================================================================
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =============================================================================
# JWT — Xác thực Token (JSON Web Token)
# secret: Khóa bí mật dùng ký token (đọc từ .env, KHÔNG hardcode)
# expiration: Thời hạn token = 86400000ms = 24 giờ
# =============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =============================================================================
# LOGGING — Cấu hình mức độ ghi log
# security=DEBUG: Theo dõi chi tiết quá trình xác thực (chỉ bật khi DEV)
# com.bot=DEBUG: Log chi tiết code nghiệp vụ dự án
# =============================================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.bot=DEBUG
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# =============================================================================
# EMAIL — Cấu hình gửi mail (Gmail SMTP)
# Dùng cho tính năng gửi mã OTP khi "Quên mật khẩu"
# username/password: đọc từ .env (App Password của Gmail, không phải mật khẩu thường)
# =============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# =============================================================================
# GOOGLE OAuth2 — Đăng nhập bằng tài khoản Google
# client.id: Client ID từ Google Cloud Console (đọc từ .env)
# =============================================================================
google.client.id=${GOOGLE_CLIENT_ID}

# =============================================================================
# REDIS CACHE — Bộ nhớ đệm cho dữ liệu hay đọc
# host: Mặc định localhost khi chạy local, đổi thành "redis" khi chạy Docker
# port: Mặc định 6379
# timeout: Tối đa 2 giây cho mỗi lần kết nối Redis
# =============================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# =============================================================================
# AI SERVICE — Kết nối tới Python FastAPI AI Service
# Mặc định localhost:8000 khi chạy local
# Khi chạy Docker: ghi đè bởi biến AI_SERVICE_URL=http://ai_service:8000
# =============================================================================
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# =============================================================================
# RATE LIMITER — Giới hạn số lượng request (bảo vệ chống spam)
# Áp dụng cho: /api/v1/chat/* (endpoint dễ bị spam nhất)
# max-requests: Số request tối đa cho phép trong 1 cửa sổ thời gian
# window-seconds: Độ dài cửa sổ thời gian tính bằng giây
# → Mặc định: 30 request / 60 giây mỗi IP → Vượt ngưỡng → HTTP 429
# =============================================================================
rate.limit.max-requests=30
rate.limit.window-seconds=60

# =============================================================================
# RABBITMQ — Hàng đợi tin nhắn bất đồng bộ
# Dùng cho: Gửi email OTP không blocking, xử lý tác vụ nặng nền
# host: Mặc định localhost khi chạy local, ghi đè bởi RABBITMQ_HOST khi Docker
# port: 5672 (AMQP protocol chuẩn)
# username/password: Đọc từ .env để bảo mật
# Management UI: http://localhost:15672 (admin/password khi dev)
# =============================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:password}

# =============================================================================
# FILE UPLOAD — Cấu hình lưu trữ ảnh Avatar
# upload.dir: Thư mục vật lý lưu file ảnh trên máy chủ
# upload.url: Prefix URL tĩnh dùng để FE truy cập ảnh đã upload
# max-file-size: Giới hạn kích thước 1 file upload (5MB)
# max-request-size: Giới hạn tổng dung lượng request multipart (5MB)
# =============================================================================
app.upload.dir=uploads
app.upload.url=/uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB